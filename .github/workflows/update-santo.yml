name: Aggiorna Santo del Giorno

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3
      with:
        persist-credentials: true

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Installa dipendenze Python
      run: |
        python -m pip install --upgrade pip
        python -m pip install requests

    - name: Recupera Santo del Giorno da API
      run: |
        python - <<PY
        import requests, json

        url = "https://www.santodelgiorno.it/api/today"
        r = requests.get(url, timeout=20)
        r.raise_for_status()

        data = r.json()
        santo = data.get("nome", "ERRORE_ESTRAZIONE")

        with open("santo-oggi.json", "w", encoding="utf-8") as f:
            json.dump({"santo": santo}, f, ensure_ascii=False)

        print("ESTRATTO:", santo)
        PY

    - name: Mostra santo-oggi.json
      run: |
        echo "Contenuto santo-oggi.json:"
        cat santo-oggi.json

    - name: Commit e push
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add santo-oggi.json
        git commit -m "Aggiornamento automatico Santo del Giorno" || echo "Nessuna modifica"
        git push
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "github-actions@github.com"
        git add santo-oggi.json
        git commit -m "Aggiornamento automatico Santo del Giorno" || echo "Nessuna modifica"
        git push
